services:
  - type: web
    name: bird-recognition-api
    runtime: python
    buildCommand: pip install -r requirements-deploy.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: bird-db
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.11.0

databases:
  - name: bird-db
    databaseName: birddb
    plan: free